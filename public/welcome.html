<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QuickRiver</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a1628;
      color: #eaf2f8;
      font-family: 'VT323', monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 20px 0;
    }

    .screen {
      width: 390px;
      height: min(720px, calc(100vh - 40px));
      background: linear-gradient(180deg, #0f2744 0%, #1a4a7a 35%, #2a7ab0 70%, #48b4d8 100%);
      border-radius: 20px;
      border: 3px solid #4a9cc8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 28px;
      box-shadow: 0 0 40px rgba(72, 180, 216, 0.25), 0 0 80px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    /* Sunlight shimmer at top */
    .screen::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 150px;
      background: linear-gradient(180deg, rgba(245, 220, 100, 0.15), transparent);
      pointer-events: none;
    }

    /* Water sparkle at bottom */
    .screen::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(180deg, transparent, rgba(125, 216, 240, 0.2));
      pointer-events: none;
    }

    .season-tag {
      font-family: 'Press Start 2P', cursive;
      font-size: 9px;
      color: #ffe066;
      letter-spacing: 3px;
      margin-bottom: 16px;
      text-shadow: 0 0 10px rgba(255, 224, 102, 0.4);
    }

    h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 18px;
      color: #fff;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3), 0 0 20px rgba(72, 180, 216, 0.4);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .fish-icon {
      font-size: 72px;
      margin-bottom: 28px;
      animation: bob 2.5s ease-in-out infinite;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    }

    .message {
      font-size: 30px;
      color: #fff;
      line-height: 1.5;
      margin-bottom: 12px;
      max-width: 320px;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
    }

    .message strong {
      color: #ffe066;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5), 0 0 12px rgba(255, 224, 102, 0.3);
    }

    .message-sub {
      font-size: 24px;
      color: #fff;
      line-height: 1.5;
      margin-bottom: 12px;
      max-width: 320px;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
    }

    .alert {
      font-family: 'Press Start 2P', cursive;
      font-size: 10px;
      color: #fff;
      background: rgba(233, 69, 96, 0.6);
      border: 2px solid #e94560;
      border-radius: 6px;
      padding: 12px 20px;
      margin: 20px 0 32px;
      letter-spacing: 1px;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.4);
    }

    .shop-btn {
      padding: 16px 32px;
      font-family: 'Press Start 2P', cursive;
      font-size: 11px;
      color: #fff;
      background: linear-gradient(180deg, #2dc653, #1a8a3a);
      border: 2px solid #4ade80;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 4px 0 #0f6028, 0 0 20px rgba(45, 198, 83, 0.3);
      transition: all 0.1s;
      text-decoration: none;
      display: inline-block;
      letter-spacing: 1px;
      z-index: 1;
    }

    .shop-btn:hover {
      background: linear-gradient(180deg, #4ade80, #2dc653);
      box-shadow: 0 4px 0 #0f6028, 0 0 30px rgba(45, 198, 83, 0.5);
    }

    .shop-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #0f6028;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="season-tag">SPRING IS HERE</div>
    <h1>QuickRiver</h1>
    <div class="fish-icon">🐟</div>
    <p class="message">Hey there, angler! <strong>Time to restock!</strong></p>
    <p class="message-sub">Grab some fresh bait and gear up for the season.</p>
    <div class="alert">0 BAIT REMAINING</div>
    <a href="index.html" class="shop-btn">VISIT TACKLE SHOP</a>
  </div>
</body>
</html>
