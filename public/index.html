<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Tackle Shop</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Mobile game phone frame — 390x720 fixed container -->
  <div class="game-container">

    <header class="shop-header">
      <h1>The Tackle Shop</h1>
    </header>

    <!-- Tabbed product categories -->
    <nav class="tabs">
      <button class="tab active" data-tab="bait">BAIT</button>
      <button class="tab" data-tab="gear">GEAR</button>
      <button class="tab" data-tab="powerups">&#9733; POWER-UPS</button>
    </nav>

    <section class="shop-panel">

      <!-- ==========================================
           BAIT Tab — One-time purchase products
           Each product uses SBL directives to pull
           live data from FastSpring:
             data-fsc-item-path    → links to product ID
             data-fsc-item-display → product name
             data-fsc-item-price   → price
             data-fsc-item-description-summary → description
             data-fsc-item-image   → product image
           ========================================== -->
      <div class="tab-content active" id="tab-bait">
        <div class="product-row" data-fsc-item-path="guppy-6-pack">
          <img src="images/guppies.svg" alt="Guppies" class="product-thumb"
               data-fsc-item-path="guppy-6-pack" data-fsc-item-image>
          <div class="product-info">
            <span class="product-name" data-fsc-item-path="guppy-6-pack" data-fsc-item-display><!--name--></span>
            <span class="product-desc" data-fsc-item-path="guppy-6-pack" data-fsc-item-description-summary><!--desc--></span>
            <span class="price" data-fsc-item-path="guppy-6-pack" data-fsc-item-price><!--price--></span>
          </div>
          <!-- SBL cart actions:
               data-fsc-item-path-value  → targets this product
               data-fsc-item-quantity-value → binds quantity selector
               data-fsc-action="Add"     → adds to cart on click -->
          <div class="product-actions">
            <select data-fsc-item-path-value="guppy-6-pack" data-fsc-item-quantity-value class="qty-select">
              <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="5">5</option>
            </select>
            <button data-fsc-item-path-value="guppy-6-pack" data-fsc-action="Add" class="add-btn">+</button>
          </div>
        </div>

        <div class="product-row" data-fsc-item-path="squid-bait">
          <img src="images/squid.svg" alt="Squid" class="product-thumb"
               data-fsc-item-path="squid-bait" data-fsc-item-image>
          <div class="product-info">
            <span class="product-name" data-fsc-item-path="squid-bait" data-fsc-item-display><!--name--></span>
            <span class="product-desc" data-fsc-item-path="squid-bait" data-fsc-item-description-summary><!--desc--></span>
            <span class="price" data-fsc-item-path="squid-bait" data-fsc-item-price><!--price--></span>
          </div>
          <div class="product-actions">
            <select data-fsc-item-path-value="squid-bait" data-fsc-item-quantity-value class="qty-select">
              <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="5">5</option>
            </select>
            <button data-fsc-item-path-value="squid-bait" data-fsc-action="Add" class="add-btn">+</button>
          </div>
        </div>
      </div>

      <!-- GEAR Tab — One-time purchase products -->
      <div class="tab-content" id="tab-gear">
        <div class="product-row" data-fsc-item-path="fishing-rod">
          <img src="images/rod.svg" alt="Rod" class="product-thumb"
               data-fsc-item-path="fishing-rod" data-fsc-item-image>
          <div class="product-info">
            <span class="product-name" data-fsc-item-path="fishing-rod" data-fsc-item-display><!--name--></span>
            <span class="product-desc" data-fsc-item-path="fishing-rod" data-fsc-item-description-summary><!--desc--></span>
            <span class="price" data-fsc-item-path="fishing-rod" data-fsc-item-price><!--price--></span>
          </div>
          <div class="product-actions">
            <button data-fsc-item-path-value="fishing-rod" data-fsc-action="Add" class="add-btn">+</button>
          </div>
        </div>

        <div class="product-row" data-fsc-item-path="fishing-line">
          <img src="images/line.svg" alt="Line" class="product-thumb"
               data-fsc-item-path="fishing-line" data-fsc-item-image>
          <div class="product-info">
            <span class="product-name" data-fsc-item-path="fishing-line" data-fsc-item-display><!--name--></span>
            <span class="product-desc" data-fsc-item-path="fishing-line" data-fsc-item-description-summary><!--desc--></span>
            <span class="price" data-fsc-item-path="fishing-line" data-fsc-item-price><!--price--></span>
          </div>
          <div class="product-actions">
            <button data-fsc-item-path-value="fishing-line" data-fsc-action="Add" class="add-btn">+</button>
          </div>
        </div>
      </div>

      <!-- ==========================================
           POWER-UPS Tab — Subscription products
           Same SBL directives as one-time products.
           FastSpring handles the subscription logic —
           no separate code needed for recurring billing.
           ========================================== -->
      <div class="tab-content" id="tab-powerups">
        <div class="product-row sub-row" data-fsc-item-path="sun-hat-subscription">
          <img src="images/sunhat.svg" alt="Sun Hat Sub" class="product-thumb"
               data-fsc-item-path="sun-hat-subscription" data-fsc-item-image>
          <div class="product-info">
            <span class="product-name" data-fsc-item-path="sun-hat-subscription" data-fsc-item-display><!--name--></span>
            <span class="product-desc" data-fsc-item-path="sun-hat-subscription" data-fsc-item-description-summary><!--desc--></span>
            <span class="sub-tag">MONTHLY</span>
            <span class="price" data-fsc-item-path="sun-hat-subscription" data-fsc-item-price><!--price--></span>
          </div>
          <div class="product-actions">
            <button data-fsc-item-path-value="sun-hat-subscription" data-fsc-action="Add" class="add-btn sub-add">+</button>
          </div>
        </div>

        <div class="product-row sub-row" data-fsc-item-path="gatorade-subscription">
          <img src="images/gatorade.svg" alt="Gatorade" class="product-thumb"
               data-fsc-item-path="gatorade-subscription" data-fsc-item-image>
          <div class="product-info">
            <span class="product-name" data-fsc-item-path="gatorade-subscription" data-fsc-item-display><!--name--></span>
            <span class="product-desc" data-fsc-item-path="gatorade-subscription" data-fsc-item-description-summary><!--desc--></span>
            <span class="sub-tag">MONTHLY</span>
            <span class="price" data-fsc-item-path="gatorade-subscription" data-fsc-item-price><!--price--></span>
          </div>
          <div class="product-actions">
            <button data-fsc-item-path-value="gatorade-subscription" data-fsc-action="Add" class="add-btn sub-add">+</button>
          </div>
        </div>
      </div>

    </section>

    <!-- ==========================================
         CART — "Tackle Box"
         SBL actions handle all cart logic:
           data-fsc-action="Reset"     → empties cart
           data-fsc-order-total        → live cart total
           data-fsc-promocode-value    → promo code input
           data-fsc-action="Promocode" → applies promo code
         ========================================== -->
    <section class="cart-summary" id="shop-view-cart">
      <div class="cart-header">
        <span class="cart-title">TACKLE BOX</span>
        <button data-fsc-action="Reset" class="reset-btn">EMPTY</button>
      </div>
      <div class="cart-contents" id="cart-contents">
        <p class="cart-empty">Empty - add some gear!</p>
      </div>
      <div class="cart-footer-row">
        <div class="cart-totals">
          <span class="cart-total-label">Total:</span>
          <span class="cart-total-value" data-fsc-order-total><!--total--></span>
        </div>
        <div class="promo-row">
          <input type="text" data-fsc-promocode-value placeholder="Promo" class="promo-input">
          <button data-fsc-action="Promocode" class="promo-btn">OK</button>
        </div>
      </div>
      <!-- Currency switcher — calls fastspring.builder.country()
           to override geolocation and update all prices on the page.
           FastSpring handles currency automatically by IP, but this
           gives users manual control. -->
      <div class="cart-checkout-row">
        <select id="currency-select" class="currency-select">
          <option value="US">USD $</option>
          <option value="GB">GBP £</option>
          <option value="DE">EUR €</option>
          <option value="JP">JPY ¥</option>
          <option value="AU">AUD $</option>
          <option value="CA">CAD $</option>
          <option value="BR">BRL R$</option>
        </select>
        <button class="checkout-btn" id="checkout-btn">CHECKOUT</button>
      </div>
    </section>

    <!-- ==========================================
         EMBEDDED CHECKOUT
         Replaces the shop view when CHECKOUT is clicked.
         fastspring.builder.checkout() triggers the
         FastSpring embedded checkout to render inside
         fsc-embedded-checkout-container.
         ========================================== -->
    <section class="checkout-view" id="checkout-view">
      <div class="checkout-header">
        <button class="back-btn" id="back-to-shop">&larr; BACK</button>
        <span class="checkout-title">CHECKOUT</span>
      </div>
      <div id="fsc-embedded-checkout-container" class="checkout-embed"></div>
    </section>

  </div>

  <!-- ==========================================
       FASTSPRING SBL SETUP
       data-storefront    → connects to our test storefront
       data-data-callback → fires on every session change
                            (cart update, price change, etc.)
                            Used to sync our custom cart UI.
       ========================================== -->
  <script>
    function dataCallback(data) {
      if (window.renderCart) window.renderCart(data);
    }
  </script>

  <script
    id="fsc-api"
    src="https://sbl.onfastspring.com/sbl/1.0.6/fastspring-builder.min.js"
    type="text/javascript"
    data-storefront="quickriver.test.onfastspring.com/embedded-test"
    data-data-callback="dataCallback">
  </script>

  <script src="app.js"></script>
</body>
</html>
